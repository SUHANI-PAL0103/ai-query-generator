# ============================================================
# AI SQL Query Generator - Application Configuration
# ============================================================

# Application
spring.application.name=ai-sql-assistant
server.port=${PORT:8081}
# Environment variables are set directly in Render dashboard
# For local development, you can still use .env files
# spring.config.import=optional:file:.env[.properties],optional:file:../../.env[.properties]

# ============================================================
# Default DataSource: minimal config only
# Real database credentials are provided per-user via frontend
# ============================================================
spring.datasource.url=jdbc:h2:mem:default
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ============================================================
# JPA / Hibernate (default - per-user DB connections are handled dynamically)
# ============================================================
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ============================================================
# Hugging Face API Configuration
# ============================================================
# Get your API key from: https://huggingface.co/settings/tokens
huggingface.api.key=${HUGGINGFACE_API_KEY:}

# ============================================================
# Logging Configuration
# ============================================================
logging.level.com.suhani.aiquerygenerator=DEBUG
logging.level.org.springframework=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ============================================================
# MongoDB Configuration (User Registry - Admin only)
# ============================================================
spring.data.mongodb.uri=${MONGODB_URI:}

# ============================================================
# Jackson JSON Configuration
# ============================================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.date-format=yyyy-MM-dd'T'HH:mm:ss
spring.jackson.time-zone=UTC
