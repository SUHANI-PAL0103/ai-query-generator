services:
  - type: web
    name: ai-query-generator
    env: docker
    dockerfilePath: ./backend/ai-query-generator/Dockerfile
    region: singapore
    plan: free
    branch: main
    healthCheckPath: /api/db/schema
    envVars:
      - key: HUGGINGFACE_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false